<body>
     <header>

                      </li>
                  </ul>
             </nav>
        </div>
    </header>

<section class="post-section">

    <div class="info-box">
        <h2 id="h2">Turn Your Waste Into Opportunity</h2>
        <p id="pi">Share details about your waste materials. Skilled workers will suggest creative products that can be made from it.</p>
    </div>

    <div class="form-container">
        <h2>Post Your Waste</h2>

        <form>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label>Location</label>
                <input type="text" placeholder="City / Area" required>
            </div>

            <div class="form-group">
                <label>Type of Waste</label>
                <select required>
                    <option value="">Select Waste Type</option>
                    <option>Broken Tiles</option>
                    <option>Plastic Bottles</option>
                    <option>Wood / Furniture</option>
                    <option>Metal Scrap</option>
                    <option>Cloth Waste</option>
                </select>
            </div>

            <div class="form-group">
                <label>Quantity</label>
                <input type="text" placeholder="e.g. 20kg, 3 pieces" required>
            </div>

            <div class="form-group">
                <label>What would you like it turned into?</label>
                <textarea placeholder="Describe expected product..."></textarea>
            </div>

            <div class="form-group">
                <label>Upload Image of Waste</label>
                <input type="file"placeholder=".jpg/.pdf..">
            </div>

            <button type="submit">Submit Waste Request</button>

        </form>
    </div>

</section>

</body>
